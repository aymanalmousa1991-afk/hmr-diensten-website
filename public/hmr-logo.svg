<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B4D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A2A4A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Achtergrond cirkel -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGrad)" />
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#primaryGrad)" stroke-width="3" opacity="0.3" />

  <!-- Schuinstrepen/clean accent -->
  <path d="M120 80 L320 280" stroke="url(#primaryGrad)" stroke-width="1" opacity="0.2" />
  <path d="M100 100 L300 300" stroke="url(#primaryGrad)" stroke-width="1" opacity="0.15" />

  <!-- Schoonmaak icoon - emmer/mop -->
  <g transform="translate(200, 145)">
    <!-- Emmer -->
    <rect x="-22" y="10" width="44" height="55" rx="4" fill="none" stroke="url(#primaryGrad)" stroke-width="3" />
    <path d="M-22 10 Q0 0 22 10" fill="none" stroke="url(#primaryGrad)" stroke-width="3" />
    <!-- Emmer handvat -->
    <path d="M-14 10 Q0 -10 14 10" fill="none" stroke="url(#primaryGrad)" stroke-width="2.5" />
    <!-- Water in emmer -->
    <rect x="-18" y="40" width="36" height="21" rx="3" fill="url(#primaryGrad)" opacity="0.25" />
    <!-- Mop steel -->
    <line x1="0" y1="0" x2="0" y2="-30" stroke="url(#primaryGrad)" stroke-width="3" stroke-linecap="round" />
    <!-- Mop kop -->
    <path d="M-15 -30 Q0 -25 15 -30" fill="none" stroke="url(#primaryGrad)" stroke-width="3" stroke-linecap="round" />
    <line x1="-12" y1="-28" x2="-12" y2="-22" stroke="url(#primaryGrad)" stroke-width="1.5" />
    <line x1="-6" y1="-28" x2="-6" y2="-22" stroke="url(#primaryGrad)" stroke-width="1.5" />
    <line x1="0" y1="-28" x2="0" y2="-22" stroke="url(#primaryGrad)" stroke-width="1.5" />
    <line x1="6" y1="-28" x2="6" y2="-22" stroke="url(#primaryGrad)" stroke-width="1.5" />
    <line x1="12" y1="-28" x2="12" y2="-22" stroke="url(#primaryGrad)" stroke-width="1.5" />
  </g>

  <!-- Glans/sparkle effecten -->
  <g opacity="0.6">
    <circle cx="145" cy="120" r="3" fill="#00E5A0" />
    <circle cx="260" cy="110" r="2" fill="#00B4D8" />
    <circle cx="280" cy="180" r="2.5" fill="#00E5A0" />
    <circle cx="130" cy="170" r="2" fill="#00B4D8" />
  </g>

  <!-- Tekst HMR -->
  <text x="200" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="800" letter-spacing="8" fill="url(#primaryGrad)">HMR</text>

  <!-- Tekst DIENSTEN -->
  <text x="200" y="290" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="300" letter-spacing="10" fill="#8899AA">DIENSTEN</text>

  <!-- Dekorative lijn -->
  <line x1="140" y1="260" x2="260" y2="260" stroke="url(#primaryGrad)" stroke-width="1.5" opacity="0.4" />

  <!-- Cirkel accent -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#primaryGrad)" stroke-width="1" opacity="0.15" stroke-dasharray="8 8" />
</svg>
